.nav {
  position: fixed;
  top: 0;
  left: 0;

}

.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 var(--space-md);
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  font-weight: 600;
  font-size: 18px;
  color: var(--text-primary);
}

.logo-icon {
  font-size: 24px;
}

.nav-links {
  display: flex;
  gap: var(--space-lg);
  list-style: none;
}

.nav-links a {
  color: var(--text-secondary);
  font-size: 14px;
  transition: color var(--transition);
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--text-primary);
}

@media (max-width: 640px) {
  .nav-links {
    gap: var(--space-sm);
  }
  .nav-links a {
    font-size: 12px;
  }
}
</style>
